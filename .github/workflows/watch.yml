name: ASCII Cats mint watcher

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:          # lets you run it manually from the Actions tab

# allow the job to commit state.json back to the repo
permissions:
  contents: write

concurrency:
  group: asciicats-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check mint status
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python3 check.py

      - name: Save state
        run: |
          if ! git diff --quiet state.json; then
            git config user.name "asciicats-bot"
            git config user.email "actions@github.com"
            git add state.json
            git commit -m "update mint state [skip ci]"
            git push
          else
            echo "no state change"
          fi
